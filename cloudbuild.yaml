substitutions:
  _AR_REPO: ''
  _GH_REPO: ''
  _IMAGE: ''   # backend | db | frontend
  _TAG: ''
  _CACHE: 'no' # 'yes' for backend and frontend

steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        gcloud auth configure-docker "$${AR_REPO%%/*}" -q
        docker buildx create --use --driver docker-container
        ref="$$AR_REPO/$$GH_REPO/$$IMAGE:$$TAG"
        set -- build "$$IMAGE" -f "docker/$$IMAGE/Dockerfile" -t "$$ref" --push
        if [ "$$CACHE" = yes ]; then
          c="$$AR_REPO/$$GH_REPO/$$IMAGE:buildcache"
          set -- "$$@" \
            --cache-from "type=registry,ref=$$c" \
            --cache-to "type=registry,ref=$$c,mode=max,image-manifest=true,oci-mediatypes=true"
        fi
        docker buildx "$$@"
    env:
      - 'AR_REPO=${_AR_REPO}'
      - 'GH_REPO=${_GH_REPO}'
      - 'IMAGE=${_IMAGE}'
      - 'TAG=${_TAG}'
      - 'CACHE=${_CACHE}'

options:
  logging: CLOUD_LOGGING_ONLY
