substitutions:
  _CONTEXT: ''    # Docker build context directory
  _DOCKERFILE: '' # path to the Dockerfile
  _REF: ''        # full image reference, e.g. us-docker.pkg.dev/proj/repo/backend:abc123
  _CACHE: 'false' # 'true' to push/pull a registry build cache

steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        docker buildx create --use --driver docker-container
        set -- build "$$CONTEXT" -f "$$DOCKERFILE" -t "$$REF" --push
        if [ "$$CACHE" = true ]; then
          c="$${REF%:*}:buildcache"
          set -- "$$@" \
            --cache-from "type=registry,ref=$$c" \
            --cache-to "type=registry,ref=$$c,mode=max,image-manifest=true,oci-mediatypes=true"
        fi
        docker buildx "$$@"
    env:
      - 'CONTEXT=${_CONTEXT}'
      - 'DOCKERFILE=${_DOCKERFILE}'
      - 'REF=${_REF}'
      - 'CACHE=${_CACHE}'

options:
  logging: CLOUD_LOGGING_ONLY
