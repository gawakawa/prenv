name: "GC (trigger)"

on:
  schedule:
    - cron: "0 20 * * *" # 05:00 JST daily

permissions:
  contents: read

jobs:
  discover:
    name: Discover stale environments
    runs-on: ubuntu-latest
    environment: pr
    timeout-minutes: 5
    permissions:
      id-token: write
    outputs:
      prs: ${{ steps.prs.outputs.prs }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
      - name: List PRs whose tofu state has been idle for 3+ days
        id: prs
        env:
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          GH_REPO: ${{ github.repository }}
        run: |
          repo="${GH_REPO,,}"
          prs=$(gcloud storage objects list "gs://${GCS_BUCKET}/${repo}/pr/*/default.tfstate" \
            --filter="updated < -P3D" \
            --format="value(name.segment(3))" \
            | jq -Rcn '[inputs]')
          echo "prs=${prs}" >> "$GITHUB_OUTPUT"

  gc:
    name: GC PR #${{ matrix.pr }}
    needs: discover
    if: needs.discover.outputs.prs != '[]'
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.discover.outputs.prs) }}
    # Pin to a SHA or tag before relying on this in production.
    uses: gawakawa/prenv/.github/workflows/destroy-prenv.yml@main
    with:
      pr: ${{ matrix.pr }}
