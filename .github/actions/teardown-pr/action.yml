name: "Tear down PR preview environment"
description: "Authenticate to Google Cloud, tofu destroy the ephemeral env for a PR, and update its comment"

inputs:
  pr:
    description: "PR number"
    required: true
  project_id:
    description: "Google Cloud project ID"
    required: true
  gcs_bucket:
    description: "GCS bucket for tofu state"
    required: true
  wif_provider:
    description: "Workload Identity provider"
    required: true
  service_account:
    description: "Deploy service account"
    required: true
  gh_token:
    description: "Token for gh pr comment"
    required: true

runs:
  using: "composite"
  steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
      with:
        workload_identity_provider: ${{ inputs.wif_provider }}
        service_account: ${{ inputs.service_account }}

    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
      with:
        tofu_wrapper: false

    - name: Terraform init
      shell: bash
      working-directory: terraform/env/pr/ephemeral
      env:
        PR_NUMBER: ${{ inputs.pr }}
        GCS_BUCKET: ${{ inputs.gcs_bucket }}
      run: |
        : "${GCS_BUCKET:?GCS_BUCKET environment variable is not set — see README setup step 4}"
        tofu init -backend-config="bucket=${GCS_BUCKET}" -backend-config="prefix=pr/${PR_NUMBER}"

    - name: Terraform destroy
      shell: bash
      working-directory: terraform/env/pr/ephemeral
      env:
        TF_VAR_project_id: ${{ inputs.project_id }}
        TF_VAR_pr_number: ${{ inputs.pr }}
      run: |
        : "${TF_VAR_project_id:?project_id input is not set — see README setup step 4}"
        tofu destroy -auto-approve

    - name: Update PR comment
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        PR_NUMBER: ${{ inputs.pr }}
      run: |
        body=$(printf "## ✅ Preview environment torn down\n\nPR #%s environment destroyed.\n" "$PR_NUMBER")
        gh pr comment "$PR_NUMBER" --edit-last --create-if-none --body "$body" || true
