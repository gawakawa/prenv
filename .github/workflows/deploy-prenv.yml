name: "Deploy prenv"

on:
  pull_request:
    types: [labeled]

concurrency:
  group: prenv-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy preview environment
    runs-on: ubuntu-latest
    environment: pr
    timeout-minutes: 15
    if: github.event.label.name == 'preview'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
          token_format: access_token

      - name: Resolve image reference
        id: image
        env:
          AR_REPO: ${{ vars.AR_REPO }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            echo "host=${AR_REPO%%/*}"
            echo "ref=${AR_REPO}/app:${HEAD_SHA}"
            echo "db_ref=${AR_REPO}/db:${HEAD_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false

      - name: Log in to Artifact Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ steps.image.outputs.host }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push images
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          files: docker-bake.hcl
          targets: default
          push: true
        env:
          AR_REPO: ${{ vars.AR_REPO }}
          TAG: ${{ github.event.pull_request.head.sha }}

      - name: Terraform init
        working-directory: terraform/env/pr/ephemeral
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
        run: |
          tofu init -backend-config="bucket=${GCS_BUCKET}" -backend-config="prefix=pr/${PR_NUMBER}"

      - name: Terraform apply
        working-directory: terraform/env/pr/ephemeral
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_pr_number: ${{ github.event.pull_request.number }}
          TF_VAR_image: ${{ steps.image.outputs.ref }}
          TF_VAR_db_image: ${{ steps.image.outputs.db_ref }}
        run: |
          tofu apply -auto-approve

      - name: Get preview URL
        id: url
        working-directory: terraform/env/pr/ephemeral
        run: echo "url=$(tofu output -raw url)" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.url.outputs.url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          body=$(printf "## 🚀 Preview environment\n\n**URL:** %s\n\nDeployed from commit \`%s\`\n\n> Close the PR to tear down (stale environments are also GC'd daily).\n" "$PREVIEW_URL" "$HEAD_SHA")
          gh pr comment "$PR_NUMBER" --edit-last --create-if-none --body "$body"
