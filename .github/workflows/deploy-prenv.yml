name: "Deploy prenv"

on:
  pull_request:
    types: [labeled]

concurrency:
  group: prenv-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy preview environment
    runs-on: ubuntu-latest
    environment: pr
    timeout-minutes: 15
    if: github.event.label.name == 'preview'
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      BUILD_SA: ${{ vars.BUILD_SA }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Resolve image reference
        id: image
        env:
          AR_REPO: ${{ vars.AR_REPO }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          repo="${GH_REPO,,}"
          backend_tag=$(git rev-parse  "HEAD:backend"  "HEAD:docker/backend/Dockerfile"  | sha256sum | cut -c1-16)
          db_tag=$(git rev-parse       "HEAD:db"       "HEAD:docker/db/Dockerfile"       | sha256sum | cut -c1-16)
          frontend_tag=$(git rev-parse "HEAD:frontend" "HEAD:docker/frontend/Dockerfile" | sha256sum | cut -c1-16)
          {
            echo "ref=${AR_REPO}/${repo}/backend:${backend_tag}"
            echo "db_ref=${AR_REPO}/${repo}/db:${db_tag}"
            echo "frontend_ref=${AR_REPO}/${repo}/frontend:${frontend_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false

      - name: Build backend image
        id: build-backend
        background: true
        env:
          REF: ${{ steps.image.outputs.ref }}
        run: .github/scripts/build-image.sh backend "$REF"

      - name: Build db image
        id: build-db
        background: true
        env:
          REF: ${{ steps.image.outputs.db_ref }}
        run: .github/scripts/build-image.sh db "$REF"

      - name: Build frontend image
        id: build-frontend
        background: true
        env:
          REF: ${{ steps.image.outputs.frontend_ref }}
        run: .github/scripts/build-image.sh frontend "$REF"

      - name: Wait for image builds
        wait: [build-backend, build-db, build-frontend]

      - name: Terraform init
        working-directory: terraform/env/pr/ephemeral
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
        run: |
          tofu init -backend-config="bucket=${GCS_BUCKET}" -backend-config="prefix=pr/${PR_NUMBER}"

      - name: Terraform apply
        working-directory: terraform/env/pr/ephemeral
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_pr_number: ${{ github.event.pull_request.number }}
          TF_VAR_image: ${{ steps.image.outputs.ref }}
          TF_VAR_db_image: ${{ steps.image.outputs.db_ref }}
          TF_VAR_frontend_image: ${{ steps.image.outputs.frontend_ref }}
        run: |
          tofu apply -auto-approve

      - name: Get preview URL
        id: url
        working-directory: terraform/env/pr/ephemeral
        run: echo "url=$(tofu output -raw url)" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.url.outputs.url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          body=$(printf "## 🚀 Preview environment\n\n**URL:** %s\n\nDeployed from commit \`%s\`\n\n> Close the PR to tear down (stale environments are also GC'd daily).\n" "$PREVIEW_URL" "$HEAD_SHA")
          gh pr comment "$PR_NUMBER" --edit-last --create-if-none --body "$body"
