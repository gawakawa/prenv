name: "Preview – Teardown PR"

on:
  workflow_call:
    inputs:
      pr:
        description: "PR number"
        required: true
        type: string
      project_id:
        description: "Google Cloud project ID"
        required: true
        type: string
      gcs_bucket:
        description: "GCS bucket for tofu state"
        required: true
        type: string
      wif_provider:
        description: "Workload Identity provider"
        required: true
        type: string
      service_account:
        description: "Deploy service account"
        required: true
        type: string

permissions:
  contents: read

jobs:
  teardown:
    name: Tear down PR #${{ inputs.pr }}
    runs-on: ubuntu-latest
    environment: pr
    timeout-minutes: 15
    permissions:
      id-token: write
    concurrency:
      group: prenv-${{ inputs.pr }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false
      - name: Terraform init
        working-directory: terraform/env/pr/ephemeral
        env:
          PR_NUMBER: ${{ inputs.pr }}
          GCS_BUCKET: ${{ inputs.gcs_bucket }}
        run: |
          : "${GCS_BUCKET:?GCS_BUCKET environment variable is not set — see README setup step 4}"
          tofu init -backend-config="bucket=${GCS_BUCKET}" -backend-config="prefix=pr/${PR_NUMBER}"
      - name: Terraform destroy
        working-directory: terraform/env/pr/ephemeral
        env:
          TF_VAR_project_id: ${{ inputs.project_id }}
          TF_VAR_pr_number: ${{ inputs.pr }}
        run: |
          : "${TF_VAR_project_id:?project_id input is not set — see README setup step 4}"
          tofu destroy -auto-approve
