name: "Destroy prenv"

on:
  workflow_call:
    inputs:
      pr:
        description: "PR number"
        required: true
        type: string

permissions:
  contents: read

jobs:
  teardown:
    name: Tear down PR #${{ inputs.pr }}
    runs-on: ubuntu-latest
    environment: preview
    timeout-minutes: 15
    permissions:
      id-token: write
    concurrency:
      group: prenv-${{ inputs.pr }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false
      - name: Terraform init
        working-directory: terraform/env/preview
        env:
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
        run: |
          repo="${GH_REPO,,}"
          tofu init -backend-config="bucket=${GCS_BUCKET}" -backend-config="prefix=${repo}/pr/${PR_NUMBER}"
      - name: Terraform destroy
        working-directory: terraform/env/preview
        env:
          GH_REPO: ${{ github.repository }}
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_pr_number: ${{ inputs.pr }}
        run: |
          export TF_VAR_repo="${GH_REPO,,}"
          tofu destroy -auto-approve
