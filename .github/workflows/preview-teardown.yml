name: "Preview – Teardown"

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to tear down"
        required: true
        type: string

concurrency:
  group: prenv-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  teardown:
    name: Tear down preview environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false

      - name: Resolve PR number
        id: pr
        env:
          PR_FROM_EVENT: ${{ github.event.pull_request.number }}
          PR_FROM_INPUT: ${{ inputs.pr_number }}
        run: echo "number=${PR_FROM_EVENT:-$PR_FROM_INPUT}" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: terraform/preview
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: tofu init -backend-config="prefix=pr/${PR_NUMBER}"

      - name: Terraform destroy
        working-directory: terraform/preview
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_pr_number: ${{ steps.pr.outputs.number }}
        run: tofu destroy -auto-approve

      - name: Update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const marker = '<!-- prenv-preview-url -->';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n## ✅ Preview environment torn down\n\nPR #${process.env.PR_NUMBER} environment destroyed.`,
              });
            }
