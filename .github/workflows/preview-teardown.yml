name: "Preview – Teardown"

on:
  pull_request:
    types: [closed, unlabeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to tear down"
        required: true
        type: string

concurrency:
  group: prenv-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  teardown:
    name: Tear down preview environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run teardown when:
    # - closed: any PR close (tofu destroy is a no-op on empty state)
    # - unlabeled: the 'preview' label was just removed
    # - workflow_dispatch: explicit manual teardown
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.action == 'closed' ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'preview')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false

      - name: Resolve PR number
        id: pr
        env:
          PR_FROM_EVENT: ${{ github.event.pull_request.number }}
          PR_FROM_INPUT: ${{ inputs.pr_number }}
        run: echo "number=${PR_FROM_EVENT:-$PR_FROM_INPUT}" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: terraform/env/pr/ephemeral
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
        run: |
          : "${GCS_BUCKET:?GCS_BUCKET repository variable is not set — see README setup step 2}"
          tofu init -backend-config="bucket=${GCS_BUCKET}" -backend-config="prefix=pr/${PR_NUMBER}"

      - name: Terraform destroy
        working-directory: terraform/env/pr/ephemeral
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_pr_number: ${{ steps.pr.outputs.number }}
        run: tofu destroy -auto-approve

      - name: Update PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          body=$(printf "## ✅ Preview environment torn down\n\nPR #%s environment destroyed.\n" "$PR_NUMBER")
          gh pr comment "$PR_NUMBER" --edit-last --body "$body" || true
