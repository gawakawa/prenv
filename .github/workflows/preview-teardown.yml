name: "Preview – Teardown"

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve PR number
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      pr: ${{ steps.pr.outputs.pr }}
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_FROM_EVENT: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$PR_FROM_EVENT" ]; then
            pr="$PR_FROM_EVENT"
          else
            pr=$(gh pr list --repo "$REPO" --head "$BRANCH" --state all --json number --jq '.[0].number // empty')
          fi
          : "${pr:?No PR found for branch ${BRANCH}}"
          echo "pr=${pr}" >> "$GITHUB_OUTPUT"

  teardown:
    name: Tear down PR #${{ needs.resolve.outputs.pr }}
    needs: resolve
    permissions:
      id-token: write
    uses: ./.github/workflows/teardown-pr.yml
    with:
      pr: ${{ needs.resolve.outputs.pr }}
      project_id: ${{ vars.GCP_PROJECT_ID }}
      gcs_bucket: ${{ vars.GCS_BUCKET }}
      wif_provider: ${{ vars.WIF_PROVIDER }}
      service_account: ${{ vars.DEPLOY_SA }}
